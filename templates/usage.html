{% extends "base.html" %} {% block content %} {% include "character.html" %}
<div class="box">
    <h3>2022-10-29</h3>
    <p>Only started tracking this a week ago ..</p>
</div>
{% if usage %}
<div class="box">
    <h3>Usage</h3>
    <table>
        <thead>
            <tr>
                <th align="left">User</th>
                <th>Count</th>
                <th>Last</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usage %}
            <tr>
                <td align="left">{{ u.name }}</td>
                <td>{{ u.count }}</td>
                <td>{{ u.last|datetime }}</td>
            </tr>
            {% endfor %}
        </tbody>
        <tfoot>
            <tr>
                <td></td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</div>
{% endif %} {% endblock %}
